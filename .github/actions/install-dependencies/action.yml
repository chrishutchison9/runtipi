name: Install dependencies

description: Install dependencies

runs:
  using: "composite"
  steps:
    - uses: oven-sh/setup-bun@v2
      name: Install Bun
      with:
        bun-version: "1.2.22"

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Build
      shell: bash
      run: bun run build
